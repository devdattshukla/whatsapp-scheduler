name: WhatsApp Scheduler

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install requests

      - run: python send.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          PHONE_NUMBER_ID: ${{ secrets.PHONE_NUMBER_ID }}
